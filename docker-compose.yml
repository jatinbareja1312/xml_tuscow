version: "3.9"

services:
  db:
    image: postgres:17
    container_name: xml-graph-db
    environment:
      POSTGRES_DB: xml_graph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
