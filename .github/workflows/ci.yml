name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_dev.txt
          python -m pip install -r DatabaseModels/requirements.txt
          python -m pip install -r Jobs/bootstrap_upsert_graph/requirements.txt
          python -m pip install -r API/requirements.txt
          npm install --prefix "$HOME/.local" sonarlint

      - name: Run Graph Ingestion pipeline
        run: |
          bash "Pipeline/Graph Ingestion Job/run_all.sh"
